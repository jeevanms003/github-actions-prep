name: C++ CI/CD - Max Element

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install g++
      run: sudo apt update && sudo apt install -y g++

    - name: Compile code
      run: g++ src/max_element.cpp tests/test_max.cpp -o test_app

    - name: Run tests
      run: ./test_app

    # ✅ CD STEP
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: max-element-app
        path: test_app
  /*

  name: MERN CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build

    # ✅ CD STEP
    - name: Upload build files
      uses: actions/upload-artifact@v4
      with:
        name: mern-app-build
        path: build
    */

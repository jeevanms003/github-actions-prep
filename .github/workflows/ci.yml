name: C++ CI/CD - Max Element

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install g++
      run: sudo apt update && sudo apt install -y g++

    - name: Compile code
      run: g++ src/max_element.cpp tests/test_max.cpp -o test_app

    - name: Run tests
      run: ./test_app

    # ✅ CD STEP
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: max-element-app
        path: test_app